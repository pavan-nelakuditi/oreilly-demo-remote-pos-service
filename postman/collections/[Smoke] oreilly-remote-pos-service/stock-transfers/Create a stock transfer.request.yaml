type: http
name: Create a stock transfer
url: '{{baseUrl}}/stock-transfers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "counterNumber": 7170,
      "receivingStoreNumber": 5866,
      "customer": {
        "customerNumber": 90001234
      },
      "orderType": "string",
      "itemDetails": [
        {
          "line": "string",
          "item": "string",
          "quantity": 3419
        }
      ],
      "shipToName": "string",
      "shipToAddress": "string",
      "shipToCity": "string",
      "shipToState": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "transferId": "string",
            "status": "success",
            "location": "string",
            "locationCityState": "string",
            "items": [
              {
                "line": "string",
                "item": "string",
                "quantity": 5613
              },
              {
                "line": "string",
                "item": "string",
                "quantity": 1651
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Stock transfer created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Request payload failed API boundary validation.
