type: http
name: Create a stock transfer
url: '{{baseUrl}}/stock-transfers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "counterNumber": 5801,
      "receivingStoreNumber": 9248,
      "customer": {
        "customerNumber": 90001234
      },
      "orderType": "string",
      "itemDetails": [
        {
          "line": "string",
          "item": "string",
          "quantity": 6319
        }
      ],
      "shipToName": "string",
      "shipToAddress": "string",
      "shipToCity": "string",
      "shipToState": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "transferId": "string",
            "status": "pending",
            "location": "string",
            "locationCityState": "string",
            "items": [
              {
                "line": "string",
                "item": "string",
                "quantity": 6118
              },
              {
                "line": "string",
                "item": "string",
                "quantity": 9747
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Stock transfer created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Request payload failed API boundary validation.
