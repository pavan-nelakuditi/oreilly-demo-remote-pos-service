type: http
name: Create a stock transfer
url: '{{baseUrl}}/stock-transfers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "counterNumber": 7637,
      "receivingStoreNumber": 4731,
      "customer": {
        "customerNumber": 90001234
      },
      "orderType": "string",
      "itemDetails": [
        {
          "line": "string",
          "item": "string",
          "quantity": 7258
        }
      ],
      "shipToName": "string",
      "shipToAddress": "string",
      "shipToCity": "string",
      "shipToState": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "transferId": "string",
            "status": "success",
            "location": "string",
            "locationCityState": "string",
            "items": [
              {
                "line": "string",
                "item": "string",
                "quantity": 2647
              },
              {
                "line": "string",
                "item": "string",
                "quantity": 7269
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Stock transfer created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Request payload failed API boundary validation.
