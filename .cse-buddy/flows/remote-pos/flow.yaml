spec:
  fileName: openapi.yaml
  title: OReilly Remote POS API
  version: 1.0.0
flows:
  - name: Remote POS Stage Smoke
    type: smoke
    steps:
      - stepKey: create-remote-invoice-1
        operationId: createRemoteInvoice
        bindings: []
        extract:
          - variable: createRemoteInvoice.invoiceNumber
            jsonPath: $.invoiceNumber
          - variable: createRemoteInvoice.customerValidationStatus
            jsonPath: $.customerValidationStatus
          - variable: createRemoteInvoice.notificationStatus
            jsonPath: $.notificationStatus
      - stepKey: get-remote-invoice-2
        operationId: getRemoteInvoice
        bindings:
          - fieldKey: invoiceNumber
            source: prior_output
            sourceStepKey: create-remote-invoice-1
            variable: createRemoteInvoice.invoiceNumber
        extract: []
