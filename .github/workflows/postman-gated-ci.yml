name: Postman Gated CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'api/openapi.bundled.yaml'
      - '.postman/**'
      - 'postman/**'

jobs:
  gated:
    if: github.event_name != 'push' || github.event.head_commit.author.name != 'Postman CSE'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: pavan-nelakuditi/oreilly-shared-contracts
          ref: v0
          path: shared-contracts
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Validate specs
        run: npm run validate:specs
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Check breaking changes
        run: npm run check:breaking
      - name: Build production runtime
        run: npm run build
      - name: Publish bundled spec to repo
        id: bundled_spec
        run: |
          cp dist/openapi.bundled.yaml api/openapi.bundled.yaml
          git config user.name "Postman CSE"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/openapi.bundled.yaml
          if git diff --cached --quiet; then
            echo "spec_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync bundled spec"
            git push origin HEAD:main
            echo "spec_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - name: Wait for bundled spec to be readable
        env:
          SPEC_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.bundled_spec.outputs.spec_ref }}/api/openapi.bundled.yaml
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS "$SPEC_URL" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Bundled spec did not become readable at $SPEC_URL" >&2
          exit 1
      - name: Debug local spec context before onboarding
        run: |
          echo "pwd=$(pwd)"
          echo "github.workspace=${{ github.workspace }}"
          echo "github.repository=${{ github.repository }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          git rev-parse HEAD
          echo "--- top level ---"
          ls -la
          echo "--- api ---"
          ls -la api
          echo "--- baselines ---"
          ls -la baselines
          echo "--- .postman ---"
          ls -la .postman || true
          test -f api/openapi.yaml && echo "found api/openapi.yaml"
          test -f baselines/openapi.yaml && echo "found baselines/openapi.yaml"
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import YAML from 'yaml';

          const ignoredDirs = new Set(['.git', '.omc', '.omx', '.llm-plans', 'node_modules', 'dist']);
          const results = [];

          function isOpenApiSpec(filePath) {
            if (!/\.(json|yaml|yml)$/.test(filePath)) return false;
            try {
              const raw = fs.readFileSync(filePath, 'utf8');
              const parsed = filePath.endsWith('.json') ? JSON.parse(raw) : YAML.parse(raw);
              return Boolean(
                parsed &&
                  typeof parsed === 'object' &&
                  ((parsed.swagger === '2.0' && parsed.paths && typeof parsed.paths === 'object') ||
                    (typeof parsed.openapi === 'string' && parsed.paths && typeof parsed.paths === 'object'))
              );
            } catch {
              return false;
            }
          }

          function visit(currentDir) {
            for (const entry of fs.readdirSync(currentDir, { withFileTypes: true })) {
              if (ignoredDirs.has(entry.name)) continue;
              const fullPath = path.join(currentDir, entry.name);
              if (entry.isDirectory()) {
                visit(fullPath);
                continue;
              }
              if (entry.isFile() && isOpenApiSpec(fullPath)) {
                results.push(fullPath.split(path.sep).join('/'));
              }
            }
          }

          visit('.');
          console.log('discovered-specs=' + JSON.stringify(results.sort()));

          if (fs.existsSync('.postman/resources.yaml')) {
            const resources = YAML.parse(fs.readFileSync('.postman/resources.yaml', 'utf8')) || {};
            console.log('preexisting-cloud-specs=' + JSON.stringify(resources.cloudResources?.specs || {}));
          } else {
            console.log('preexisting-cloud-specs={}');
          }
          NODE
      - name: Resolve existing Postman resource IDs
        id: postman_resources
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import YAML from 'yaml';

          const outputPath = process.env.GITHUB_OUTPUT;
          const outputs = {
            workspace_id: '',
            spec_id: '',
            baseline_collection_id: '',
            smoke_collection_id: '',
            contract_collection_id: '',
            mock_url: '',
            monitor_id: ''
          };

          const resourcesPath = '.postman/resources.yaml';
          if (fs.existsSync(resourcesPath)) {
            const resources = YAML.parse(fs.readFileSync(resourcesPath, 'utf8')) || {};
            const cloudResources = resources.cloudResources || {};
            const collections = cloudResources.collections || {};
            const specs = cloudResources.specs || {};

            outputs.workspace_id = String(resources.workspace?.id || '');
            outputs.spec_id = String(Object.values(specs)[0] || '');

            for (const [filePath, uid] of Object.entries(collections)) {
              const value = String(uid || '');
              if (!outputs.baseline_collection_id && filePath.includes('[Baseline]')) {
                outputs.baseline_collection_id = value;
              }
              if (!outputs.smoke_collection_id && filePath.includes('[Smoke]')) {
                outputs.smoke_collection_id = value;
              }
              if (!outputs.contract_collection_id && filePath.includes('[Contract]')) {
                outputs.contract_collection_id = value;
              }
            }
          }

          const serialized = Object.entries(outputs)
            .map(([key, value]) => `${key}=${String(value).replace(/\n/g, '%0A')}`)
            .join('\n');
          fs.appendFileSync(outputPath, `${serialized}\n`);
          NODE
      - id: onboarding
        name: Run Postman API onboarding
        uses: postman-cs/postman-api-onboarding-action@main
        with:
          project-name: ${{ github.event.repository.name }}
          workspace-id: ${{ steps.postman_resources.outputs.workspace_id }}
          spec-id: ${{ steps.postman_resources.outputs.spec_id }}
          baseline-collection-id: ${{ steps.postman_resources.outputs.baseline_collection_id }}
          smoke-collection-id: ${{ steps.postman_resources.outputs.smoke_collection_id }}
          contract-collection-id: ${{ steps.postman_resources.outputs.contract_collection_id }}
          collection-sync-mode: refresh
          spec-sync-mode: update
          release-label: ''
          monitor-id: ${{ steps.postman_resources.outputs.monitor_id }}
          mock-url: ${{ steps.postman_resources.outputs.mock_url }}
          monitor-cron: ''
          spec-path: api/openapi.yaml
          spec-url: https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.bundled_spec.outputs.spec_ref }}/api/openapi.bundled.yaml
          generate-ci-workflow: false
          repo-write-mode: commit-and-push
          domain: workshop-pilot
          domain-code: OR
          requester-email: workshop.owner@example.com
          environments-json: '["TEST","STAGE","PROD"]'
          env-runtime-urls-json: '{"TEST":"http://localhost:3000","STAGE":"http://k8s-ingressn-ingressn-85f6f7b4d5-ac9798de040a319d.elb.us-west-1.amazonaws.com","PROD":"https://api.oreilly-demo.example.com"}'
          governance-mapping-json: '{"workshop-pilot":"Workshop Pilot"}'
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Debug Postman onboarding outputs
        if: always()
        run: |
          echo "workspace-id=${{ steps.onboarding.outputs.workspace-id }}"
          echo "spec-id=${{ steps.onboarding.outputs.spec-id }}"
          echo "baseline-collection-id=${{ steps.onboarding.outputs.baseline-collection-id }}"
          echo "smoke-collection-id=${{ steps.onboarding.outputs.smoke-collection-id }}"
          echo "contract-collection-id=${{ steps.onboarding.outputs.contract-collection-id }}"
          echo "bootstrap-outcome=${{ steps.onboarding.outputs.bootstrap-outcome }}"
          echo "repo-sync-outcome=${{ steps.onboarding.outputs.repo-sync-outcome }}"
          echo "commit-sha=${{ steps.onboarding.outputs.commit-sha }}"
          echo "--- .postman files ---"
          find .postman -maxdepth 2 -type f | sort || true
          echo "--- resources.yaml ---"
          test -f .postman/resources.yaml && cat .postman/resources.yaml || echo "missing .postman/resources.yaml"
          echo "--- workflows.yaml ---"
          test -f .postman/workflows.yaml && cat .postman/workflows.yaml || echo "missing .postman/workflows.yaml"
      - name: Resolve synced Postman resource IDs
        id: synced_postman_resources
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import YAML from 'yaml';

          const outputPath = process.env.GITHUB_OUTPUT;
          const resources = YAML.parse(fs.readFileSync('.postman/resources.yaml', 'utf8')) || {};
          const cloudResources = resources.cloudResources || {};
          const collections = cloudResources.collections || {};
          const environments = cloudResources.environments || {};

          const contractCollectionId = Object.entries(collections).find(([filePath]) =>
            filePath.includes('[Contract]')
          )?.[1];
          const environmentId = Object.entries(environments).find(([filePath]) =>
            filePath.endsWith('TEST.postman_environment.json')
          )?.[1];

          if (!contractCollectionId || !environmentId) {
            throw new Error('Missing synced Postman contract collection or TEST environment ID after onboarding.');
          }

          fs.appendFileSync(
            outputPath,
            `contract_collection_id=${contractCollectionId}\nenvironment_id=${environmentId}\n`
          );
          NODE
      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key "${{ secrets.POSTMAN_API_KEY }}"
      - name: Run generated contract collection against localhost
        run: |
          node --import tsx ./src/server.ts >/tmp/remote-pos-service.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health >/dev/null; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS http://localhost:3000/health >/dev/null; then
            cat /tmp/remote-pos-service.log
            exit 1
          fi

          postman collection run "${{ steps.synced_postman_resources.outputs.contract_collection_id }}" \
            -e "${{ steps.synced_postman_resources.outputs.environment_id }}" \
            --report-events \
            --env-var CI=true
      - name: Upload service log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: remote-pos-service-log
          path: /tmp/remote-pos-service.log
          if-no-files-found: ignore
