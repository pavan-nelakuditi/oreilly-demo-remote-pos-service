name: Postman Onboarding

on:
  workflow_dispatch:
    inputs:
      workspace_id:
        description: Existing Postman workspace ID to reuse
        required: false
        type: string
      spec_id:
        description: Existing Postman spec ID to reuse
        required: false
        type: string
      baseline_collection_id:
        description: Existing baseline collection ID to reuse
        required: false
        type: string
      smoke_collection_id:
        description: Existing smoke collection ID to reuse
        required: false
        type: string
      contract_collection_id:
        description: Existing contract collection ID to reuse
        required: false
        type: string
      mock_url:
        description: Existing mock server URL to reuse
        required: false
        type: string
      monitor_id:
        description: Existing monitor ID to reuse
        required: false
        type: string
      collection_sync_mode:
        description: Collection lifecycle policy
        required: true
        type: choice
        default: refresh
        options:
          - refresh
          - version
      spec_sync_mode:
        description: Spec lifecycle policy
        required: true
        type: choice
        default: update
        options:
          - update
          - version
      release_label:
        description: Optional release label for versioned sync
        required: false
        type: string
      monitor_cron:
        description: Optional cron expression for monitor scheduling
        required: false
        type: string
      requester_email:
        description: Requester email for workspace membership
        required: false
        default: workshop.owner@example.com
        type: string
      repo_write_mode:
        description: Repo mutation mode for generated Postman assets
        required: true
        type: choice
        default: commit-and-push
        options:
          - commit-and-push
          - commit-only
      environments_json:
        description: JSON array of environment slugs to create
        required: false
        default: '["TEST","STAGE","PROD"]'
        type: string
      env_runtime_urls_json:
        description: JSON map of environment slug to runtime base URL
        required: false
        default: '{"TEST":"http://localhost:3000","STAGE":"https://stage.oreilly-demo.example.com","PROD":"https://api.oreilly-demo.example.com"}'
        type: string

jobs:
  onboarding:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: pavan-nelakuditi/oreilly-shared-contracts
          ref: v0
          path: shared-contracts
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Validate and bundle spec
        run: npm run validate:specs
      - name: Publish bundled spec to repo
        id: bundled_spec
        run: |
          cp dist/openapi.bundled.yaml api/openapi.bundled.yaml
          git config user.name "Postman CSE"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/openapi.bundled.yaml
          git diff --cached --quiet || git commit -m "chore: sync bundled spec"
          git diff --cached --quiet || git push origin HEAD:main
          echo "spec_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Debug local spec context before onboarding
        run: |
          echo "pwd=$(pwd)"
          echo "github.workspace=${{ github.workspace }}"
          echo "github.repository=${{ github.repository }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          git rev-parse HEAD
          echo "--- top level ---"
          ls -la
          echo "--- api ---"
          ls -la api
          echo "--- baselines ---"
          ls -la baselines
          echo "--- .postman ---"
          ls -la .postman || true
          test -f api/openapi.yaml && echo "found api/openapi.yaml"
          test -f baselines/openapi.yaml && echo "found baselines/openapi.yaml"
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import YAML from 'yaml';

          const ignoredDirs = new Set(['.git', '.omc', '.omx', '.llm-plans', 'node_modules', 'dist']);
          const results = [];

          function isOpenApiSpec(filePath) {
            if (!/\.(json|yaml|yml)$/.test(filePath)) return false;
            try {
              const raw = fs.readFileSync(filePath, 'utf8');
              const parsed = filePath.endsWith('.json') ? JSON.parse(raw) : YAML.parse(raw);
              return Boolean(
                parsed &&
                  typeof parsed === 'object' &&
                  ((parsed.swagger === '2.0' && parsed.paths && typeof parsed.paths === 'object') ||
                    (typeof parsed.openapi === 'string' && parsed.paths && typeof parsed.paths === 'object'))
              );
            } catch {
              return false;
            }
          }

          function visit(currentDir) {
            for (const entry of fs.readdirSync(currentDir, { withFileTypes: true })) {
              if (ignoredDirs.has(entry.name)) continue;
              const fullPath = path.join(currentDir, entry.name);
              if (entry.isDirectory()) {
                visit(fullPath);
                continue;
              }
              if (entry.isFile() && isOpenApiSpec(fullPath)) {
                results.push(fullPath.split(path.sep).join('/'));
              }
            }
          }

          visit('.');
          console.log('discovered-specs=' + JSON.stringify(results.sort()));

          if (fs.existsSync('.postman/resources.yaml')) {
            const resources = YAML.parse(fs.readFileSync('.postman/resources.yaml', 'utf8')) || {};
            console.log('preexisting-cloud-specs=' + JSON.stringify(resources.cloudResources?.specs || {}));
          } else {
            console.log('preexisting-cloud-specs={}');
          }
          NODE
      - id: onboarding
        name: Run Postman API onboarding
        uses: postman-cs/postman-api-onboarding-action@main
        with:
          project-name: ${{ github.event.repository.name }}
          workspace-id: ${{ github.event.inputs.workspace_id }}
          spec-id: ${{ github.event.inputs.spec_id }}
          baseline-collection-id: ${{ github.event.inputs.baseline_collection_id }}
          smoke-collection-id: ${{ github.event.inputs.smoke_collection_id }}
          contract-collection-id: ${{ github.event.inputs.contract_collection_id }}
          collection-sync-mode: ${{ github.event.inputs.collection_sync_mode }}
          spec-sync-mode: ${{ github.event.inputs.spec_sync_mode }}
          release-label: ${{ github.event.inputs.release_label }}
          monitor-id: ${{ github.event.inputs.monitor_id }}
          mock-url: ${{ github.event.inputs.mock_url }}
          monitor-cron: ${{ github.event.inputs.monitor_cron }}
          spec-path: api/openapi.bundled.yaml
          generate-ci-workflow: false
          repo-write-mode: ${{ github.event.inputs.repo_write_mode }}
          domain: workshop-pilot
          domain-code: OR
          requester-email: ${{ github.event.inputs.requester_email }}
          environments-json: ${{ github.event.inputs.environments_json }}
          env-runtime-urls-json: ${{ github.event.inputs.env_runtime_urls_json }}
          governance-mapping-json: '{"workshop-pilot":"Workshop Pilot"}'
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Debug Postman onboarding outputs
        if: always()
        run: |
          echo "workspace-id=${{ steps.onboarding.outputs.workspace-id }}"
          echo "spec-id=${{ steps.onboarding.outputs.spec-id }}"
          echo "baseline-collection-id=${{ steps.onboarding.outputs.baseline-collection-id }}"
          echo "smoke-collection-id=${{ steps.onboarding.outputs.smoke-collection-id }}"
          echo "contract-collection-id=${{ steps.onboarding.outputs.contract-collection-id }}"
          echo "bootstrap-outcome=${{ steps.onboarding.outputs.bootstrap-outcome }}"
          echo "repo-sync-outcome=${{ steps.onboarding.outputs.repo-sync-outcome }}"
          echo "commit-sha=${{ steps.onboarding.outputs.commit-sha }}"
          echo "--- .postman files ---"
          find .postman -maxdepth 2 -type f | sort || true
          echo "--- resources.yaml ---"
          test -f .postman/resources.yaml && cat .postman/resources.yaml || echo "missing .postman/resources.yaml"
          echo "--- workflows.yaml ---"
          test -f .postman/workflows.yaml && cat .postman/workflows.yaml || echo "missing .postman/workflows.yaml"
